name: Sync TP to Intervals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          TP_USERNAME: ${{ secrets.TP_USERNAME }}
          TP_PASSWORD: ${{ secrets.TP_PASSWORD }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: python main.py
